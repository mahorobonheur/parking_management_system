# Local stack: SQL Server + API. Optional: copy .env.example to .env and adjust variables.
services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Dev_Docker_Sql123!}"
    ports:
      - "${SQL_HOST_PORT:-14333}:1433"
    healthcheck:
      test:
        - CMD-SHELL
        - >
          /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 35s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      sql:
        condition: service_healthy
    ports:
      - "${API_HOST_PORT:-5000}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sql;Database=ParkingManagementSystem;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Dev_Docker_Sql123!};TrustServerCertificate=True;MultipleActiveResultSets=true"
      Jwt__Secret: "${JWT_SECRET:-DockerDevelopmentSecret_ChangeMe_AtLeast32CharsLong!!}"
      Jwt__Issuer: "${JWT_ISSUER:-ParkingManagementSystem}"
      Jwt__Audience: "${JWT_AUDIENCE:-ParkingManagementSystem.Clients}"
